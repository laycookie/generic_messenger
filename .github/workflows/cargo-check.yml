name: Cargo check

on:
  push:
  pull_request:

jobs:
  cargo-check:
    name: cargo check (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: nixos
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        if: matrix.platform == 'nixos'
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: brew install opus pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install nightly-2026-04-17 --profile minimal

      - name: Cargo check (NixOS)
        if: matrix.platform == 'nixos'
        run: nix-shell -I nixpkgs=channel:nixos-unstable -p alsa-lib opus pkg-config --run "cargo check"

      - name: Cargo check
        if: matrix.platform != 'nixos'
        run: cargo check
