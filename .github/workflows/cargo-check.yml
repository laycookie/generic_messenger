name: Cargo check

on:
  push:
  pull_request:

jobs:
  cargo-check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install nightly-2026-04-17 --profile minimal

      - name: Cargo check
        run: cargo check
