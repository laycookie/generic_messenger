name: Cargo check

on:
  push:
  pull_request:

jobs:
  cargo-check:
    name: cargo check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        if: runner.os == 'Linux'
        uses: cachix/install-nix-action@v31
        with:
          extra-nix-shell-args: --extra-experimental-features "nix-command flakes"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install nightly-2026-04-17 --profile minimal

      - name: Cargo check (Ubuntu with Nix)
        if: runner.os == 'Linux'
        run: nix develop -c cargo check

      - name: Cargo check
        if: runner.os != 'Linux'
        run: cargo check
