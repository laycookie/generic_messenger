[workspace]
resolver = "2"
members = [
	"macro",
	"record",
	"crate/audio",
	"crate/messenger_interface",
	"interface/discord"
]

[workspace.dependencies]
# Logs
tracing = "0.1.44"
# Serilization/Deserilization
facet = "0.44.1"
# facet = { git = "https://github.com/facet-rs/facet", branch = "main" }
facet-value = "0.44.1"
# facet-value = { git = "https://github.com/facet-rs/facet", branch = "main" }
facet-json = "0.44.1"
# facet-json = { git = "https://github.com/facet-rs/facet", branch = "main" }
facet-pretty = "0.44.1"
# facet-pretty = { git = "https://github.com/facet-rs/facet", branch = "main" }
facet-error = "0.44.1"
# Async
futures = "0.3.31"
async-trait = "0.1.89"
